<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lagu Web - Sekte Creator Kece</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: #0a0a0f; 
            overflow: hidden; 
            font-family: 'Inter', sans-serif;
        }
        iframe {
            width: 100vw;
            height: 100vh;
            border: none;
        }
        .music-control {
            position: fixed;
            top: 20px;
            right: 80px;
            width: 45px;
            height: 45px;
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 9999;
            border: 1px solid rgba(0,242,254,0.2);
            color: #00f2fe;
            font-size: 20px;
            transition: all 0.3s ease;
        }
        .music-control:hover {
            transform: scale(1.1);
            box-shadow: 0 0 20px rgba(0,242,254,0.3);
        }
        .theme-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 45px;
            height: 45px;
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 9999;
            border: 1px solid rgba(0,242,254,0.2);
            color: #00f2fe;
            font-size: 20px;
            transition: all 0.3s ease;
        }
        .theme-toggle:hover {
            transform: scale(1.1);
            box-shadow: 0 0 20px rgba(0,242,254,0.3);
        }
        .loading {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0a0a0f;
            z-index: 10000;
            color: #00f2fe;
            font-size: 1.2rem;
            font-family: 'Inter', sans-serif;
            transition: opacity 0.5s ease;
        }
        .loading.hidden {
            opacity: 0;
            pointer-events: none;
        }
        .loading i {
            margin-right: 15px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .refresh-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 45px;
            height: 45px;
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 9999;
            border: 1px solid rgba(0,242,254,0.2);
            color: #00f2fe;
            font-size: 18px;
            transition: all 0.3s ease;
        }
        .refresh-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 0 20px rgba(0,242,254,0.3);
        }
        /* Navbar di player (opsional) */
        .nav-player {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background: rgba(10,10,15,0.9);
            backdrop-filter: blur(10px);
            z-index: 9998;
            padding: 10px 20px;
            display: none;
            border-bottom: 1px solid rgba(0,242,254,0.2);
        }
        .nav-player a {
            color: white;
            text-decoration: none;
            margin: 0 15px;
            font-size: 0.9rem;
        }
        .nav-player a:hover {
            color: #00f2fe;
        }
        @media (max-width: 768px) {
            .nav-player { display: none !important; }
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>

    <!-- Loading -->
    <div class="loading" id="loading">
        <i class="fas fa-spinner"></i> Loading...
    </div>

    <!-- Music Control -->
    <div class="music-control" id="musicControl">
        <i class="fas fa-play" id="musicIcon"></i>
        <audio id="bgMusic" loop preload="auto">
            <source src="https://e.top4top.io/m_3819ce0o01.mp3" type="audio/mpeg">
        </audio>
    </div>
    
    <!-- Theme Toggle -->
    <div class="theme-toggle" id="themeToggle">
        <i class="fas fa-sun"></i>
    </div>

    <!-- Refresh Button -->
    <div class="refresh-btn" id="refreshBtn" title="Refresh Halaman">
        <i class="fas fa-sync-alt"></i>
    </div>

    <!-- Iframe -->
    <iframe id="contentFrame" src="index.html" allow="autoplay"></iframe>

    <script>
        // ========== ELEMENTS ==========
        const loading = document.getElementById('loading');
        const iframe = document.getElementById('contentFrame');
        const musicControl = document.getElementById('musicControl');
        const musicIcon = document.getElementById('musicIcon');
        const bgMusic = document.getElementById('bgMusic');
        const themeToggle = document.getElementById('themeToggle');
        const refreshBtn = document.getElementById('refreshBtn');

        // ========== AUTO-FIX ALL LINKS DI DALAM IFRAME ==========
        function fixAllLinks() {
            try {
                const iframeDoc = iframe.contentDocument || iframe.contentWindow.document;
                if (!iframeDoc) return;

                // 1. Semua link <a>
                const allLinks = iframeDoc.querySelectorAll('a');
                allLinks.forEach(link => {
                    const href = link.getAttribute('href');
                    const target = link.getAttribute('target');
                    
                    // Skip link yang udah punya target, link ke luar, atau anchor
                    if (!target && href && 
                        !href.startsWith('http://') && 
                        !href.startsWith('https://') && 
                        !href.startsWith('#') &&
                        !href.startsWith('javascript:') &&
                        !href.startsWith('mailto:') &&
                        !href.startsWith('tel:')) {
                        link.setAttribute('target', '_parent');
                    }
                });

                // 2. Semua tombol dengan onclick redirect
                const allButtons = iframeDoc.querySelectorAll('[onclick]');
                allButtons.forEach(btn => {
                    let onclick = btn.getAttribute('onclick');
                    if (onclick && onclick.includes('window.location')) {
                        onclick = onclick.replace(/window\.location\.href/g, 'window.top.location.href');
                        onclick = onclick.replace(/window\.location\.replace/g, 'window.top.location.replace');
                        btn.setAttribute('onclick', onclick);
                    }
                });

                // 3. Semua tombol dengan event listener (via JS) - override
                // Ini lebih kompleks, tapi kita inject script ke dalam iframe
                const script = iframeDoc.createElement('script');
                script.textContent = `
                    // Override semua link dinamis
                    document.addEventListener('click', function(e) {
                        const target = e.target.closest('a');
                        if (target && target.href && !target.target) {
                            const href = target.getAttribute('href');
                            if (href && !href.startsWith('http') && !href.startsWith('#') && !href.startsWith('javascript')) {
                                target.target = '_parent';
                            }
                        }
                    }, true);
                    
                    // Override window.open
                    const originalOpen = window.open;
                    window.open = function(url, name, features) {
                        if (!name || name === '_blank') {
                            return originalOpen(url, '_parent', features);
                        }
                        return originalOpen(url, name, features);
                    };
                    
                    console.log('✅ Auto-fix links from inside iframe');
                `;
                iframeDoc.head.appendChild(script);

                console.log('✅ Auto-fix links completed!');
            } catch (e) {
                console.log('⚠️ Cannot access iframe content (CORS) - skip auto-fix');
            }
        }

        // ========== IFRAME LOAD EVENT ==========
        iframe.addEventListener('load', () => {
            // Hilangkan loading
            loading.classList.add('hidden');
            
            // Fix semua link
            fixAllLinks();
            
            // Sinkronin theme dari localStorage
            const savedTheme = localStorage.getItem('theme') || 'dark';
            try {
                const iframeDoc = iframe.contentDocument || iframe.contentWindow.document;
                if (savedTheme === 'light') {
                    iframeDoc.body.classList.add('light-theme');
                    themeToggle.innerHTML = '<i class="fas fa-moon"></i>';
                } else {
                    iframeDoc.body.classList.remove('light-theme');
                    themeToggle.innerHTML = '<i class="fas fa-sun"></i>';
                }
            } catch (e) {}
        });

        // ========== MUSIC CONTROL ==========
        let isPlaying = false;

        // Cek state dari localStorage
        if (localStorage.getItem('musicPlaying') === 'true') {
            isPlaying = true;
            musicIcon.className = 'fas fa-stop';
            bgMusic.play().catch(() => {});
        }

        musicControl.addEventListener('click', () => {
            if (isPlaying) {
                bgMusic.pause();
                musicIcon.className = 'fas fa-play';
                isPlaying = false;
            } else {
                bgMusic.play();
                musicIcon.className = 'fas fa-stop';
                isPlaying = true;
            }
            localStorage.setItem('musicPlaying', isPlaying);
        });

        // ========== THEME TOGGLE (UNTUK IFRAME) ==========
        let isDark = localStorage.getItem('theme') !== 'light';
        themeToggle.addEventListener('click', () => {
            isDark = !isDark;
            try {
                const iframeDoc = iframe.contentDocument || iframe.contentWindow.document;
                if (isDark) {
                    iframeDoc.body.classList.remove('light-theme');
                    themeToggle.innerHTML = '<i class="fas fa-sun"></i>';
                } else {
                    iframeDoc.body.classList.add('light-theme');
                    themeToggle.innerHTML = '<i class="fas fa-moon"></i>';
                }
            } catch (e) {}
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
        });

        // ========== REFRESH BUTTON ==========
        refreshBtn.addEventListener('click', () => {
            iframe.src = iframe.src;
            loading.classList.remove('hidden');
        });

        // ========== IF RENDER DI DALAM IFRAME, REDIRECT KE PLAYER ==========
        if (window.top !== window.self) {
            window.top.location.href = 'player.html';
        }

        // ========== KEYBOARD SHORTCUT ==========
        document.addEventListener('keydown', (e) => {
            if (e.key === ' ' || e.key === 'Space') {
                e.preventDefault();
                musicControl.click();
            }
            if (e.key === 'r' || e.key === 'R') {
                refreshBtn.click();
            }
        });

        console.log('🎵 Player loaded! Musik tetap jalan walau pindah halaman.');
        console.log('⌨️ Shortcut: Space = Play/Stop, R = Refresh');

        // ========== RIPPLE EFFECT UNTUK IFRAME ==========
function injectRippleToIframe() {
    try {
        const iframeDoc = document.getElementById('contentFrame').contentDocument || 
                          document.getElementById('contentFrame').contentWindow.document;
        if (!iframeDoc) return;
        
        // Inject CSS
        const style = iframeDoc.createElement('style');
        style.textContent = `
            .ripple {
                position: fixed;
                border-radius: 50%;
                background: rgba(0, 242, 254, 0.4);
                transform: scale(0);
                animation: rippleAnim 0.6s ease-out forwards;
                pointer-events: none;
                z-index: 99999;
                width: 20px;
                height: 20px;
                margin-left: -10px;
                margin-top: -10px;
            }
            @keyframes rippleAnim {
                to { transform: scale(6); opacity: 0; }
            }
            * {
                -webkit-tap-highlight-color: transparent;
                -webkit-touch-callout: none;
            }
            .btn:active, .leader-card:active, .tool-card:active,
            .event-card:active, .card:active {
                transform: scale(0.97);
                transition: transform 0.1s ease;
            }
        `;
        iframeDoc.head.appendChild(style);
        
        // Inject JS
        const script = iframeDoc.createElement('script');
        script.textContent = `
            let lastTouchTime = 0;
            let isScrolling = false;
            let scrollTimeout;
            
            document.addEventListener('touchstart', function(e) {
                const touch = e.touches[0];
                const now = Date.now();
                if (now - lastTouchTime < 50) return;
                lastTouchTime = now;
                isScrolling = false;
                createRipple(touch.clientX, touch.clientY);
            }, { passive: true });
            
            document.addEventListener('touchmove', function(e) {
                isScrolling = true;
                clearTimeout(scrollTimeout);
                scrollTimeout = setTimeout(() => { isScrolling = false; }, 300);
            }, { passive: true });
            
            document.addEventListener('click', function(e) {
                if (isScrolling) return;
                createRipple(e.clientX, e.clientY);
            });
            
            function createRipple(x, y) {
                const oldRipples = document.querySelectorAll('.ripple');
                oldRipples.forEach(el => el.remove());
                const ripple = document.createElement('div');
                ripple.className = 'ripple';
                ripple.style.left = x + 'px';
                ripple.style.top = y + 'px';
                document.body.appendChild(ripple);
                setTimeout(() => { ripple.remove(); }, 700);
            }
            
            document.addEventListener('click', function(e) {
                const target = e.target.closest('a, button, .btn, .leader-card, .tool-card, .event-card, .card');
                if (target) {
                    const ripples = document.querySelectorAll('.ripple');
                    ripples.forEach(el => el.remove());
                }
            }, true);
        `;
        iframeDoc.head.appendChild(script);
        
        console.log('✅ Ripple effect injected to iframe');
    } catch (e) {
        console.log('⚠️ Cannot inject ripple to iframe (CORS)');
    }
}

// Panggil setelah iframe load
document.getElementById('contentFrame').addEventListener('load', function() {
    injectRippleToIframe();
});
    </script>
</body>
</html>

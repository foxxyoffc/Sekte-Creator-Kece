<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lagu Web - Sekte Creator Kece</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: #0a0a0f; 
            overflow: hidden; 
            font-family: 'Inter', sans-serif;
        }
        iframe {
            width: 100vw;
            height: 100vh;
            border: none;
        }
        .music-control {
            position: fixed;
            top: 20px;
            right: 80px;
            width: 45px;
            height: 45px;
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 9999;
            border: 1px solid rgba(0,242,254,0.2);
            color: #00f2fe;
            font-size: 20px;
            transition: all 0.3s ease;
        }
        .music-control:hover {
            transform: scale(1.1);
            box-shadow: 0 0 20px rgba(0,242,254,0.3);
        }
        .theme-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 45px;
            height: 45px;
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 9999;
            border: 1px solid rgba(0,242,254,0.2);
            color: #00f2fe;
            font-size: 20px;
            transition: all 0.3s ease;
        }
        .theme-toggle:hover {
            transform: scale(1.1);
            box-shadow: 0 0 20px rgba(0,242,254,0.3);
        }
        .refresh-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 45px;
            height: 45px;
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 9999;
            border: 1px solid rgba(0,242,254,0.2);
            color: #00f2fe;
            font-size: 18px;
            transition: all 0.3s ease;
        }
        .refresh-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 0 20px rgba(0,242,254,0.3);
        }
        .loading {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0a0a0f;
            z-index: 10000;
            color: #00f2fe;
            font-size: 1.2rem;
            font-family: 'Inter', sans-serif;
            transition: opacity 0.5s ease;
        }
        .loading.hidden {
            opacity: 0;
            pointer-events: none;
        }
        .loading i {
            margin-right: 15px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        @media (max-width: 768px) {
            .music-control, .theme-toggle, .refresh-btn {
                width: 40px;
                height: 40px;
                font-size: 16px;
            }
            .music-control { right: 70px; top: 15px; }
            .theme-toggle { right: 15px; top: 15px; }
            .refresh-btn { bottom: 15px; right: 15px; }
        }
        /* Ripple untuk player */
        .ripple {
            position: fixed;
            border-radius: 50%;
            background: rgba(0, 242, 254, 0.4);
            transform: scale(0);
            animation: rippleAnim 0.6s ease-out forwards;
            pointer-events: none;
            z-index: 99999;
            width: 20px;
            height: 20px;
            margin-left: -10px;
            margin-top: -10px;
        }
        @keyframes rippleAnim {
            to { transform: scale(6); opacity: 0; }
        }
        * {
            -webkit-tap-highlight-color: transparent;
            -webkit-touch-callout: none;
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>

    <div class="loading" id="loading">
        <i class="fas fa-spinner"></i> Loading...
    </div>

    <div class="music-control" id="musicControl">
        <i class="fas fa-play" id="musicIcon"></i>
        <audio id="bgMusic" loop preload="auto">
            <source src="https://e.top4top.io/m_3819ce0o01.mp3" type="audio/mpeg">
        </audio>
    </div>
    
    <div class="theme-toggle" id="themeToggle">
        <i class="fas fa-sun"></i>
    </div>

    <div class="refresh-btn" id="refreshBtn" title="Refresh Halaman">
        <i class="fas fa-sync-alt"></i>
    </div>

    <iframe id="contentFrame" src="index.html" allow="autoplay"></iframe>

    <script>
        // ========== ELEMENTS ==========
        const loading = document.getElementById('loading');
        const iframe = document.getElementById('contentFrame');
        const musicControl = document.getElementById('musicControl');
        const musicIcon = document.getElementById('musicIcon');
        const bgMusic = document.getElementById('bgMusic');
        const themeToggle = document.getElementById('themeToggle');
        const refreshBtn = document.getElementById('refreshBtn');

        // ========== RIPPLE EFFECT UNTUK PLAYER ==========
        let lastTouchTime = 0;
        let isScrolling = false;
        let scrollTimeout;

        document.addEventListener('touchstart', function(e) {
            const touch = e.touches[0];
            const now = Date.now();
            if (now - lastTouchTime < 50) return;
            lastTouchTime = now;
            isScrolling = false;
            createRipple(touch.clientX, touch.clientY);
        }, { passive: true });

        document.addEventListener('touchmove', function(e) {
            isScrolling = true;
            clearTimeout(scrollTimeout);
            scrollTimeout = setTimeout(() => { isScrolling = false; }, 300);
        }, { passive: true });

        document.addEventListener('click', function(e) {
            if (isScrolling) return;
            createRipple(e.clientX, e.clientY);
        });

        function createRipple(x, y) {
            const oldRipples = document.querySelectorAll('.ripple');
            oldRipples.forEach(el => el.remove());
            const ripple = document.createElement('div');
            ripple.className = 'ripple';
            ripple.style.left = x + 'px';
            ripple.style.top = y + 'px';
            document.body.appendChild(ripple);
            setTimeout(() => { ripple.remove(); }, 700);
        }

        document.addEventListener('click', function(e) {
            const target = e.target.closest('a, button, .btn');
            if (target) {
                const ripples = document.querySelectorAll('.ripple');
                ripples.forEach(el => el.remove());
            }
        }, true);

        // ========== INJECT RIPPLE KE IFRAME ==========
        function injectRippleToIframe() {
            try {
                const iframeDoc = iframe.contentDocument || iframe.contentWindow.document;
                if (!iframeDoc) return;
                
                const style = iframeDoc.createElement('style');
                style.textContent = `
                    .ripple {
                        position: fixed;
                        border-radius: 50%;
                        background: rgba(0, 242, 254, 0.4);
                        transform: scale(0);
                        animation: rippleAnim 0.6s ease-out forwards;
                        pointer-events: none;
                        z-index: 99999;
                        width: 20px;
                        height: 20px;
                        margin-left: -10px;
                        margin-top: -10px;
                    }
                    @keyframes rippleAnim {
                        to { transform: scale(6); opacity: 0; }
                    }
                    * { -webkit-tap-highlight-color: transparent; -webkit-touch-callout: none; }
                `;
                iframeDoc.head.appendChild(style);
                
                const script = iframeDoc.createElement('script');
                script.textContent = `
                    let lastTouchTime = 0;
                    let isScrolling = false;
                    let scrollTimeout;
                    
                    document.addEventListener('touchstart', function(e) {
                        const touch = e.touches[0];
                        const now = Date.now();
                        if (now - lastTouchTime < 50) return;
                        lastTouchTime = now;
                        isScrolling = false;
                        createRipple(touch.clientX, touch.clientY);
                    }, { passive: true });
                    
                    document.addEventListener('touchmove', function(e) {
                        isScrolling = true;
                        clearTimeout(scrollTimeout);
                        scrollTimeout = setTimeout(() => { isScrolling = false; }, 300);
                    }, { passive: true });
                    
                    document.addEventListener('click', function(e) {
                        if (isScrolling) return;
                        createRipple(e.clientX, e.clientY);
                    });
                    
                    function createRipple(x, y) {
                        const oldRipples = document.querySelectorAll('.ripple');
                        oldRipples.forEach(el => el.remove());
                        const ripple = document.createElement('div');
                        ripple.className = 'ripple';
                        ripple.style.left = x + 'px';
                        ripple.style.top = y + 'px';
                        document.body.appendChild(ripple);
                        setTimeout(() => { ripple.remove(); }, 700);
                    }
                    
                    document.addEventListener('click', function(e) {
                        const target = e.target.closest('a, button, .btn, .leader-card, .tool-card, .event-card, .card');
                        if (target) {
                            const ripples = document.querySelectorAll('.ripple');
                            ripples.forEach(el => el.remove());
                        }
                    }, true);
                `;
                iframeDoc.head.appendChild(script);
                
                console.log('✅ Ripple effect injected to iframe');
            } catch (e) {
                console.log('⚠️ Cannot inject ripple to iframe (CORS)');
            }
        }

        // ========== AUTO-FIX ALL LINKS DI IFRAME ==========
        function fixAllLinks() {
            try {
                const iframeDoc = iframe.contentDocument || iframe.contentWindow.document;
                if (!iframeDoc) return;

                const allLinks = iframeDoc.querySelectorAll('a');
                allLinks.forEach(link => {
                    const href = link.getAttribute('href');
                    const target = link.getAttribute('target');
                    if (!target && href && 
                        !href.startsWith('http://') && 
                        !href.startsWith('https://') && 
                        !href.startsWith('#') &&
                        !href.startsWith('javascript:') &&
                        !href.startsWith('mailto:') &&
                        !href.startsWith('tel:')) {
                        link.setAttribute('target', '_parent');
                    }
                });

                const allButtons = iframeDoc.querySelectorAll('[onclick]');
                allButtons.forEach(btn => {
                    let onclick = btn.getAttribute('onclick');
                    if (onclick && onclick.includes('window.location')) {
                        onclick = onclick.replace(/window\.location\.href/g, 'window.top.location.href');
                        onclick = onclick.replace(/window\.location\.replace/g, 'window.top.location.replace');
                        btn.setAttribute('onclick', onclick);
                    }
                });

                console.log('✅ Auto-fix links completed!');
            } catch (e) {
                console.log('⚠️ Cannot access iframe content (CORS) - skip auto-fix');
            }
        }

        // ========== IFRAME LOAD ==========
        iframe.addEventListener('load', () => {
            loading.classList.add('hidden');
            fixAllLinks();
            injectRippleToIframe();
            
            const savedTheme = localStorage.getItem('theme') || 'dark';
            try {
                const iframeDoc = iframe.contentDocument || iframe.contentWindow.document;
                if (savedTheme === 'light') {
                    iframeDoc.body.classList.add('light-theme');
                    themeToggle.innerHTML = '<i class="fas fa-moon"></i>';
                } else {
                    iframeDoc.body.classList.remove('light-theme');
                    themeToggle.innerHTML = '<i class="fas fa-sun"></i>';
                }
            } catch (e) {}
        });

        // ========== MUSIC ==========
        let isPlaying = false;
        if (localStorage.getItem('musicPlaying') === 'true') {
            isPlaying = true;
            musicIcon.className = 'fas fa-stop';
            bgMusic.play().catch(() => {});
        }

        musicControl.addEventListener('click', () => {
            if (isPlaying) {
                bgMusic.pause();
                musicIcon.className = 'fas fa-play';
                isPlaying = false;
            } else {
                bgMusic.play();
                musicIcon.className = 'fas fa-stop';
                isPlaying = true;
            }
            localStorage.setItem('musicPlaying', isPlaying);
        });

        // ========== THEME ==========
        let isDark = localStorage.getItem('theme') !== 'light';
        themeToggle.addEventListener('click', () => {
            isDark = !isDark;
            try {
                const iframeDoc = iframe.contentDocument || iframe.contentWindow.document;
                if (isDark) {
                    iframeDoc.body.classList.remove('light-theme');
                    themeToggle.innerHTML = '<i class="fas fa-sun"></i>';
                } else {
                    iframeDoc.body.classList.add('light-theme');
                    themeToggle.innerHTML = '<i class="fas fa-moon"></i>';
                }
            } catch (e) {}
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
        });

        // ========== REFRESH ==========
        refreshBtn.addEventListener('click', () => {
            iframe.src = iframe.src;
            loading.classList.remove('hidden');
        });

        // ========== IF IN IFRAME ==========
        if (window.top !== window.self) {
            window.top.location.href = 'player.html';
        }

        // ========== KEYBOARD ==========
        document.addEventListener('keydown', (e) => {
            if (e.key === ' ' || e.key === 'Space') {
                e.preventDefault();
                musicControl.click();
            }
            if (e.key === 'r' || e.key === 'R') {
                refreshBtn.click();
            }
        });

        console.log('🎵 Player loaded! Musik tetap jalan walau pindah halaman.');
        console.log('⌨️ Shortcut: Space = Play/Stop, R = Refresh');
    </script>
</body>
</html>
